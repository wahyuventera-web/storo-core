<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Storo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .banner {
            background: white;
            width: 1080px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        .pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(65, 105, 223, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(243, 151, 59, 0.05) 0%, transparent 50%);
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }
        .logo {
            width: 280px;
            height: auto;
            margin-bottom: 60px;
        }
        .main-title {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #4169df, #f3973b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 32px;
            color: #666;
            margin-bottom: 60px;
            font-weight: 600;
            line-height: 1.4;
        }
        .whatsapp-box {
            background: linear-gradient(135deg, #25D366, #20BA5A);
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(37, 211, 102, 0.3);
            margin-bottom: 50px;
        }
        .wa-icon {
            font-size: 100px;
            margin-bottom: 25px;
        }
        .phone-number {
            font-size: 56px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .cta-text {
            font-size: 28px;
            color: white;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
        }
        .feature {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
        }
        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .feature-text {
            font-size: 20px;
            color: white;
            font-weight: 700;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .badge {
            background: linear-gradient(135deg, #f8f9ff, #fff8f3);
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            color: #4169df;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="pattern"></div>
        <div class="content">
            <img src="../public/logo.png" alt="Storo.id" class="logo">

            <div class="main-title">Mulai Sekarang!</div>
            <div class="subtitle">Konsultasi Gratis & Tanpa Komitmen</div>

            <div class="whatsapp-box">
                <div class="wa-icon">💬</div>
                <div class="cta-text">Chat WhatsApp Kami:</div>
                <div class="phone-number">+62 856-4748-6700</div>

                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">Respon<br>5 Menit</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">💬</div>
                        <div class="feature-text">Konsultasi<br>Gratis</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🎯</div>
                        <div class="feature-text">Solusi<br>Tepat</div>
                    </div>
                </div>
            </div>

            <div class="badges">
                <div class="badge">✨ 500+ Seller Percaya</div>
                <div class="badge">⭐ Rating 4.9/5</div>
            </div>
        </div>
    </div>
</body>
</html>
